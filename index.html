    <style>
      #mainTitle {
        font-size: 32px;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 8px;
      }
      #subTitle {
        font-size: 18px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #555;
      }
      #micStatus {
        font-size: 14px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #aaa;
        margin-top: 8px;
        min-height: 20px;
        text-align: center;
      }
      #startBtn {
        margin-top: 14px;
        padding: 10px 24px;
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 16px;
        background: #ff85a1;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      #startBtn:active {
        background: #e06080;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="birthdayText"></div>
      <div id="micStatus"></div>
      <button id="startBtn">🎤 Attiva microfono</button>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
      // === Params ===
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Friend";
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      document.getElementById("birthdayText").innerHTML = `
        <div id="mainTitle">Happy Birthday, ${name}!</div>
        <div id="subTitle">Make a wish and blow out the candles! 🎂</div>
      `;

      const cake = document.getElementById("cake");
      const micStatus = document.getElementById("micStatus");
      const startBtn = document.getElementById("startBtn");

      const colors = ["green-candle", "purple-candle", "blue-candle", "yellow-candle"];
      const CAKE_VISUAL_WIDTH = 35;

      // === Candele ===
      function createCandles(count) {
        cake.innerHTML = "";
        const candlesPerRow = 6;
        const shiftAmount = 4;
        const CANDLE_VISUAL_WIDTH = 2;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          candle.classList.add(colors[Math.floor(Math.random() * colors.length)]);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalInRow = Math.min(candlesPerRow, count - row * candlesPerRow);
          const rowSpacing = CAKE_VISUAL_WIDTH / (totalInRow + 1);
          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 4}px`;
          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // === Stato ===
      let blown = false;
      let allBlown = false;
      let analyser = null;
      let dataArray = null;
      let animFrameId = null;

      // === Spegni una candela per soffio ===
      function blowOutOneCandle() {
        const active = document.querySelectorAll(".candle:not(.blown)");
        if (active.length === 0) { allBlown = true; return; }

        const target = active[Math.floor(Math.random() * active.length)];
        target.classList.add("blown");

        if (document.querySelectorAll(".candle:not(.blown)").length === 0) {
          allBlown = true;
          micStatus.textContent = "🎉 Wish granted!";
          setTimeout(() => {
            document.getElementById("subTitle").textContent =
              "Yayy! Wishing you the happiest birthday ever!! 🎉";
          }, 400);
          // Ferma il loop
          if (animFrameId) cancelAnimationFrame(animFrameId);
        }
      }

      // === Loop rilevamento soffio ===
      // Usa RMS (Root Mean Square) sul buffer temporale — molto più preciso
      // per distinguere il soffio dal rumore di fondo su mobile.
      function detectLoop(threshold) {
        if (allBlown) return;

        // Buffer temporale (waveform), non frequenze
        analyser.getByteTimeDomainData(dataArray);

        // Calcola RMS
        let sumSquares = 0;
        for (let i = 0; i < dataArray.length; i++) {
          const normalized = (dataArray[i] - 128) / 128; // -1.0 a +1.0
          sumSquares += normalized * normalized;
        }
        const rms = Math.sqrt(sumSquares / dataArray.length);

        if (rms > threshold && !blown) {
          blown = true;
          blowOutOneCandle();
          setTimeout(() => { blown = false; }, 600);
        }

        animFrameId = requestAnimationFrame(() => detectLoop(threshold));
      }

      // === Calibrazione rumore di fondo ===
      function calibrate(onDone) {
        micStatus.textContent = "🔇 Calibrazione… stai fermo/a…";
        const DURATION = 1500; // ms
        let sumRMS = 0;
        let samples = 0;
        const end = performance.now() + DURATION;

        function sample() {
          analyser.getByteTimeDomainData(dataArray);
          let sq = 0;
          for (let i = 0; i < dataArray.length; i++) {
            const n = (dataArray[i] - 128) / 128;
            sq += n * n;
          }
          sumRMS += Math.sqrt(sq / dataArray.length);
          samples++;

          if (performance.now() < end) {
            requestAnimationFrame(sample);
          } else {
            const baseRMS = samples > 0 ? sumRMS / samples : 0.01;
            // Soglia = 3x il rumore base, minimo 0.04
            const threshold = Math.max(baseRMS * 3, 0.04);
            micStatus.textContent = "💨 Soffia sulle candeline!";
            onDone(threshold);
          }
        }
        requestAnimationFrame(sample);
      }

      // === Avvio microfono (richiede gesto utente su iOS/Android) ===
      async function startMic() {
        startBtn.style.display = "none";
        micStatus.textContent = "🎤 Richiesta accesso microfono…";

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

          // AudioContext va creato DOPO il gesto utente, altrimenti iOS lo sospende
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          const audioContext = new AudioCtx();

          // Su iOS il context può partire sospeso — lo riprendiamo
          if (audioContext.state === "suspended") {
            await audioContext.resume();
          }

          const source = audioContext.createMediaStreamSource(stream);
          analyser = audioContext.createAnalyser();
          analyser.fftSize = 2048;
          source.connect(analyser);
          dataArray = new Uint8Array(analyser.fftSize);

          calibrate((threshold) => detectLoop(threshold));

        } catch (err) {
          startBtn.style.display = "block";
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            micStatus.textContent = "🚫 Permesso microfono negato. Riprova e premi 'Consenti'.";
          } else if (err.name === "NotFoundError") {
            micStatus.textContent = "⚠️ Nessun microfono trovato.";
          } else {
            micStatus.textContent = "⚠️ Errore: " + err.message;
          }
          console.error("Mic error:", err);
        }
      }

      // Il bottone è necessario su iOS/Android: getUserMedia deve essere
      // chiamato dentro un evento utente diretto (tap), altrimenti viene bloccato.
      startBtn.addEventListener("click", startMic);
    </script>
  </body>
