    <style>
      #mainTitle {
        font-size: 32px;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 8px;
      }

      #subTitle {
        font-size: 18px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #555;
      }

      #micStatus {
        font-size: 13px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #aaa;
        margin-top: 6px;
        min-height: 18px;
      }
    </style>

  <body>
    <div class="container">
      <div id="birthdayText"></div>
      <div id="micStatus"></div>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
      // === URL params ===
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Friend";
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      birthdayText.innerHTML = `
        <div id="mainTitle">Happy Birthday, ${name}!</div>
        <div id="subTitle">Make a wish and blow out the candles! 🎂</div>
      `;

      const cake = document.getElementById("cake");
      const micStatus = document.getElementById("micStatus");

      const colors = [
        "green-candle",
        "purple-candle",
        "blue-candle",
        "yellow-candle",
      ];
      const CAKE_VISUAL_WIDTH = 35;

      // === Create candles ===
      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(
            candlesPerRow,
            count - row * candlesPerRow
          );
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 4}px`;

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // === Microphone / Blow Detection ===

      // Calibration: misura il rumore di fondo nei primi 2 secondi
      // e calcola una soglia dinamica sopra di esso.
      const CALIBRATION_DURATION_MS = 2000;
      const BLOW_RATIO_MULTIPLIER = 2.5; // il soffio deve essere 2.5x il rumore base
      const MIN_ABSOLUTE_VOLUME = 15;    // ignora rumori troppo deboli

      // blown diventa true durante l'animazione, poi si resetta
      let blown = false;
      let allBlown = false; // true quando tutte le candele sono spente

      async function startMicDetection() {
        // getUserMedia richiede HTTPS (o localhost)
        if (
          location.protocol !== "https:" &&
          location.hostname !== "localhost" &&
          location.hostname !== "127.0.0.1"
        ) {
          micStatus.textContent = "⚠️ Il microfono richiede HTTPS.";
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          micStatus.textContent = "⚠️ Microfono non supportato da questo browser.";
          return;
        }

        try {
          micStatus.textContent = "🎤 Richiesta accesso microfono...";
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          analyser.fftSize = 512;
          source.connect(analyser);

          const dataArray = new Uint8Array(analyser.frequencyBinCount);

          // --- Fase 1: Calibrazione rumore di fondo ---
          micStatus.textContent = "🔇 Calibrazione in corso… non soffiare ancora.";

          let baselineSum = 0;
          let baselineSamples = 0;
          const calibrationEnd = performance.now() + CALIBRATION_DURATION_MS;

          function calibrate(timestamp) {
            if (performance.now() < calibrationEnd) {
              analyser.getByteFrequencyData(dataArray);
              const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
              baselineSum += avg;
              baselineSamples++;
              requestAnimationFrame(calibrate);
            } else {
              const baselineAvg = baselineSamples > 0
                ? baselineSum / baselineSamples
                : 5;
              const dynamicThreshold = Math.max(
                baselineAvg * BLOW_RATIO_MULTIPLIER,
                MIN_ABSOLUTE_VOLUME
              );
              micStatus.textContent = "💨 Pronto! Soffia sulle candeline!";
              startDetection(dynamicThreshold);
            }
          }

          requestAnimationFrame(calibrate);

        } catch (err) {
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            micStatus.textContent = "🚫 Accesso al microfono negato. Ricarica e premi 'Consenti'.";
          } else if (err.name === "NotFoundError") {
            micStatus.textContent = "⚠️ Nessun microfono trovato.";
          } else {
            micStatus.textContent = "⚠️ Errore microfono: " + err.message;
          }
          console.error("Mic error:", err);
        }
      }

      function startDetection(threshold) {
        const analyser = getAnalyser();
        if (!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        // Riuso l'analyser già creato tramite closure
        function detectBlow() {
          if (allBlown) return; // smetti di rilevare quando tutte le candele sono spente

          analyser.getByteFrequencyData(dataArray);

          // Volume medio totale
          const totalAvg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

          if (totalAvg > threshold && !blown) {
            blown = true;
            blowOutOneCandle();
            // Resetta blown dopo un delay per permettere soffiate multiple
            setTimeout(() => { blown = false; }, 800);
          }

          requestAnimationFrame(detectBlow);
        }

        detectBlow();
      }

      // Riferimento all'analyser condiviso (via closure trick)
      let _analyser = null;
      function getAnalyser() { return _analyser; }

      // Override startMicDetection per salvare l'analyser
      (function patchStartMic() {
        const original = startMicDetection;
        // Non serve patching, usiamo direttamente la variabile _analyser
      })();

      // Refactor: riscriviamo startMicDetection usando _analyser
      async function init() {
        if (
          location.protocol !== "https:" &&
          location.hostname !== "localhost" &&
          location.hostname !== "127.0.0.1"
        ) {
          micStatus.textContent = "⚠️ Il microfono richiede HTTPS.";
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          micStatus.textContent = "⚠️ Microfono non supportato da questo browser.";
          return;
        }

        try {
          micStatus.textContent = "🎤 Richiesta accesso microfono...";
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          _analyser = audioContext.createAnalyser();
          _analyser.fftSize = 512;
          source.connect(_analyser);

          const dataArray = new Uint8Array(_analyser.frequencyBinCount);

          // --- Calibrazione ---
          micStatus.textContent = "🔇 Calibrazione… stai fermo/a un secondo.";

          let baselineSum = 0;
          let baselineSamples = 0;
          const calibrationEnd = performance.now() + CALIBRATION_DURATION_MS;

          function calibrate() {
            if (performance.now() < calibrationEnd) {
              _analyser.getByteFrequencyData(dataArray);
              const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
              baselineSum += avg;
              baselineSamples++;
              requestAnimationFrame(calibrate);
            } else {
              const baselineAvg = baselineSamples > 0
                ? baselineSum / baselineSamples
                : 5;
              const dynamicThreshold = Math.max(
                baselineAvg * BLOW_RATIO_MULTIPLIER,
                MIN_ABSOLUTE_VOLUME
              );
              micStatus.textContent = "💨 Soffia sulle candeline!";
              listenForBlow(dynamicThreshold, dataArray);
            }
          }

          requestAnimationFrame(calibrate);

        } catch (err) {
          if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
            micStatus.textContent = "🚫 Accesso al microfono negato. Ricarica e premi 'Consenti'.";
          } else if (err.name === "NotFoundError") {
            micStatus.textContent = "⚠️ Nessun microfono trovato.";
          } else {
            micStatus.textContent = "⚠️ Errore: " + err.message;
          }
          console.error("Mic error:", err);
        }
      }

      function listenForBlow(threshold, dataArray) {
        function detectBlow() {
          if (allBlown) return;

          _analyser.getByteFrequencyData(dataArray);
          const totalAvg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

          if (totalAvg > threshold && !blown) {
            blown = true;
            blowOutOneCandle();
            setTimeout(() => { blown = false; }, 800);
          }

          requestAnimationFrame(detectBlow);
        }

        detectBlow();
      }

      // === Spegni una candela alla volta per soffio ===
      function blowOutOneCandle() {
        const activeCandles = document.querySelectorAll(".candle:not(.blown)");
        if (activeCandles.length === 0) {
          allBlown = true;
          return;
        }

        // Spegni una candela casuale tra quelle ancora accese
        const target = activeCandles[Math.floor(Math.random() * activeCandles.length)];
        target.classList.add("blown");

        // Controlla se sono tutte spente
        const remaining = document.querySelectorAll(".candle:not(.blown)");
        if (remaining.length === 0) {
          allBlown = true;
          micStatus.textContent = "🎉 Wish granted!";
          setTimeout(() => {
            const subTitle = document.getElementById("subTitle");
            subTitle.textContent = "Yayy! Wishing you the happiest birthday ever!! 🎉";
          }, 400);
        }
      }

      init();
    </script>
